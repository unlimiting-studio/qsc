embedder:
  provider: openai  # or local
  model: text-embedding-3-small
  api_key_env: OPENAI_API_KEY  # environment variable name holding the API key
  dimensions: 1536

llm:
  provider: openai
  model: gpt-4o-mini
  api_key_env: OPENAI_API_KEY

chunker:
  max_tokens: 900
  overlap: 0.15

scanner:
  exclude:
    - "node_modules/**"
    - ".git/**"
    - "dist/**"
    - "*.min.js"
  max_file_size: 1048576  # 1MB
